syntax = "proto3";

package coordinator;

option go_package = "github.com/MarioCerulo/mapreduce/engine/rpc";

service Coordinator {
  rpc RequestTask(TaskRequest) returns (TaskResponse);
  rpc ReportCompletion(Report) returns (Ack);
}

message TaskRequest {
  string worker_id = 1;
}

enum TaskType {
  TASKTYPE_UNSPECIFIED = 0;
  TASKTYPE_MAP = 1;
  TASKTYPE_REDUCE = 2;
  TASKTYPE_WAIT = 3;
  TASKTYPE_DONE = 4;
}

message TaskResponse {
  int32 task_id = 1;
  TaskType type = 2;
  optional int32 n_reducers = 3; // Only relevant for Map tasks
  repeated string files = 4;
}

message Report {
  int32 task_id = 1;
}

message Ack {}
